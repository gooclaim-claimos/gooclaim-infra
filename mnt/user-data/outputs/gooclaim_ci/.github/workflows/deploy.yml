# .github/workflows/deploy.yml
# Deployment pipeline — triggered after CI passes
#
# ENV FLOW:
#   PR merge → develop → auto-deploy → dev
#   Manual trigger on develop → deploy → sdx (sandbox)
#   PR merge → main → auto-deploy → nprd
#   Manual approval on main → deploy → prod (requires 2 approvers)

name: Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, sdx, nprd, prod]
      service:
        description: Service to deploy (or "all")
        required: true
        default: all

jobs:

  # ─────────────────────────────────────────
  # Determine target environment
  # ─────────────────────────────────────────
  resolve-env:
    name: Resolve target env
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=nprd" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────
  # Build + push Docker images
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: resolve-env
    environment: ${{ needs.resolve-env.outputs.environment }}
    strategy:
      matrix:
        service:
          - l0-channel-gateway
          - l1-workflow-engine
          - l2-truth-layer
          - l3-knowledge-layer
          - l5-outbound-engine
          - l6-policy-gate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/gooclaim/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/gooclaim/${{ matrix.service }}:${{ needs.resolve-env.outputs.environment }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ENV=${{ needs.resolve-env.outputs.environment }}
            BUILD_SHA=${{ github.sha }}

  # ─────────────────────────────────────────
  # Deploy to dev (auto on develop merge)
  # No approval needed
  # ─────────────────────────────────────────
  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    needs: [resolve-env, build-and-push]
    if: needs.resolve-env.outputs.environment == 'dev'
    environment:
      name: dev
      url: https://dev.gooclaim.internal
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to dev
        run: bash scripts/deploy.sh dev ${{ github.sha }}
        env:
          KUBE_CONFIG: ${{ secrets.DEV_KUBE_CONFIG }}

  # ─────────────────────────────────────────
  # Deploy to sdx (manual trigger only)
  # No approval — but manual dispatch required
  # ─────────────────────────────────────────
  deploy-sdx:
    name: Deploy → sdx
    runs-on: ubuntu-latest
    needs: [resolve-env, build-and-push]
    if: needs.resolve-env.outputs.environment == 'sdx'
    environment:
      name: sdx
      url: https://sdx.gooclaim.internal
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to sdx
        run: bash scripts/deploy.sh sdx ${{ github.sha }}
        env:
          KUBE_CONFIG: ${{ secrets.SDX_KUBE_CONFIG }}

  # ─────────────────────────────────────────
  # Deploy to nprd (auto on main merge)
  # No approval — but only main branch triggers this
  # ─────────────────────────────────────────
  deploy-nprd:
    name: Deploy → nprd
    runs-on: ubuntu-latest
    needs: [resolve-env, build-and-push]
    if: needs.resolve-env.outputs.environment == 'nprd'
    environment:
      name: nprd
      url: https://nprd.gooclaim.internal
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to nprd
        run: bash scripts/deploy.sh nprd ${{ github.sha }}
        env:
          KUBE_CONFIG: ${{ secrets.NPRD_KUBE_CONFIG }}

  # ─────────────────────────────────────────
  # Deploy to prod (manual only + 1 approver)
  # GitHub environment protection rule enforces approval
  # ─────────────────────────────────────────
  deploy-prod:
    name: Deploy → prod
    runs-on: ubuntu-latest
    needs: [resolve-env, build-and-push]
    if: needs.resolve-env.outputs.environment == 'prod'
    environment:
      name: prod                     # GitHub will pause here for approval
      url: https://api.gooclaim.in
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to prod
        run: bash scripts/deploy.sh prod ${{ github.sha }}
        env:
          KUBE_CONFIG: ${{ secrets.PROD_KUBE_CONFIG }}
