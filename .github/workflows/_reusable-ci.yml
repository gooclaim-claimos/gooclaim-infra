# gooclaim-infra/.github/workflows/_reusable-ci.yml
#
# MASTER CI WORKFLOW — sirf yahan update karo
# Sab service repos yahan se call karte hain
# Koi bhi change yahan karo → sab repos ko automatically mil jaata hai
#
# Called by: gooclaim-gateway, gooclaim-engine, gooclaim-truth, etc.
# Caller file: .github/workflows/ci.yml (sirf 15 lines hoti hai)

name: Reusable CI

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "e.g. gooclaim-gateway"
      python-version:
        required: false
        type: string
        default: "3.12"
      coverage-threshold:
        required: false
        type: number
        default: 80
      skip-docker:
        required: false
        type: boolean
        default: false
    secrets:
      GHCR_TOKEN:
        required: false
      GH_PAT:
        required: true
        description: "PAT with read access to gooclaim-shared (private repo)"

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — LINT (ruff)
  # Fails fast — ~10s
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Configure git for private repos
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_PAT }}@github.com" > ~/.git-credentials

      - run: pip install tox
      - run: tox -e lint

  # ─────────────────────────────────────────
  # JOB 2 — TYPE CHECK (pyright)
  # ─────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Configure git for private repos
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_PAT }}@github.com" > ~/.git-credentials

      - run: pip install tox
      - run: tox -e typecheck

  # ─────────────────────────────────────────
  # JOB 3 — SECURITY (bandit + safety + trufflehog)
  # ─────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Configure git for private repos
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_PAT }}@github.com" > ~/.git-credentials

      - run: pip install tox
      - run: tox -e security

      - name: TruffleHog — secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
        continue-on-error: true

  # ─────────────────────────────────────────
  # JOB 4 — TEST + COVERAGE
  # Gate: coverage-threshold input (default 80%)
  # ─────────────────────────────────────────
  test:
    name: Test + coverage (≥${{ inputs.coverage-threshold }}%)
    runs-on: ubuntu-latest
    needs: [typecheck, security]


    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: gooclaim
          POSTGRES_DB: gooclaim_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s

    env:
      DATABASE_URL: postgresql://gooclaim:testpass@localhost:5432/gooclaim_test
      REDIS_URL: redis://localhost:6379
      ENV: test
      COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Configure git for private repos
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_PAT }}@github.com" > ~/.git-credentials

      - run: pip install tox

      - run: |
          tox -e test -- \
            --cov-fail-under=${{ inputs.coverage-threshold }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ inputs.service-name }}
          path: htmlcov/

  # ─────────────────────────────────────────
  # JOB 5 — DOCKER BUILD CHECK
  # Skippable via skip-docker input
  # ─────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test
    if: ${{ !inputs.skip-docker }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ inputs.service-name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: gooclaim-claimos/${{ inputs.service-name }}:pr-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
