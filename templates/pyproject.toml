[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "S",    # flake8-bandit (security)
    "T20",  # no print statements
    "RUF",  # ruff-specific
]
ignore = [
    "S101",  # allow assert in tests
    "B008",  # FastAPI Depends() in function args — false positive
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "S105", "S106"]   # allow assert + hardcoded test passwords

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ─────────────────────────────────────────
# BANDIT — security scanner
# ─────────────────────────────────────────
[tool.bandit]
exclude_dirs = ["tests", ".tox", ".venv"]
skips = ["B101"]    # allow assert — already caught by ruff S101

# ─────────────────────────────────────────
# PYRIGHT — type checker
# ─────────────────────────────────────────
[tool.pyright]
include = ["src"]
exclude = ["tests", ".tox", ".venv"]
pythonVersion = "3.12"
typeCheckingMode = "strict"
reportMissingImports = true
reportMissingTypeStubs = false    # third-party stubs sometimes missing

# ─────────────────────────────────────────
# PYLINT
# ─────────────────────────────────────────
[tool.pylint.main]
source-roots = ["src"]
ignore-paths = ["tests", ".tox", ".venv", "src/migrations"]

[tool.pylint.messages_control]
disable = [
    "C0114",  # missing-module-docstring — ruff handles style
    "C0115",  # missing-class-docstring
    "C0116",  # missing-function-docstring
    "R0903",  # too-few-public-methods — common in Pydantic models
    "W0613",  # unused-argument — common in FastAPI route handlers
]

[tool.pylint.design]
max-args = 8           # FastAPI routes can have many deps
max-returns = 6
max-branches = 12

[tool.pylint.format]
max-line-length = 100  # match ruff

# ─────────────────────────────────────────
# PYTEST
# ─────────────────────────────────────────
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
