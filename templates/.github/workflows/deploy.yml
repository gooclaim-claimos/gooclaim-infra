# .github/workflows/deploy.yml
#
# Per-repo deploy entry point. SIRF service-name change karo neeche.
# Real logic gooclaim-infra/_reusable-deploy.yml mein hai.
#
# Triggers:
#   develop push → dev (auto)
#   main push    → does NOTHING (build the image only on tag/dispatch)
#   tag v*       → build only; dispatch to deploy nprd/prod
#   workflow_dispatch → user picks env (dev/nprd/prod)
#
# Required repo variables (set once via `gh variable set`):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
#   ACR_LOGIN_SERVER, ACR_NAME,
#   AKS_CLUSTER_DEV, AKS_RG_DEV, AKS_NAMESPACE

name: Deploy

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, nprd, prod]
        default: dev

jobs:

  resolve-env:
    name: Resolve target env
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          else
            ENV="dev"
          fi
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: resolve-env
    uses: gooclaim-claimos/gooclaim-infra/.github/workflows/_reusable-deploy.yml@develop
    with:
      service-name: __SERVICE_NAME__   # ← SIRF YEH CHANGE KARO per repo
      environment: ${{ needs.resolve-env.outputs.environment }}
      sha: ${{ github.sha }}
