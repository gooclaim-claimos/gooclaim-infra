# .github/workflows/deploy.yml
# Yeh file har service repo mein hogi — sirf service-name change karo
# Baaki sab gooclaim-infra/_reusable-deploy.yml se aata hai

name: Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, sdx, nprd, prod]

jobs:

  resolve-env:
    name: Resolve target env
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            ENV="dev"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="nprd"
          fi
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "environment_upper=${ENV^^}" >> $GITHUB_OUTPUT

  deploy:
    needs: resolve-env
    uses: gooclaim-claimos/gooclaim-infra/.github/workflows/_reusable-deploy.yml@main
    with:
      service-name: gooclaim-service      # ← SIRF YEH CHANGE KARO har repo mein
      environment: ${{ needs.resolve-env.outputs.environment }}
      sha: ${{ github.sha }}
    secrets:
      KUBE_CONFIG: ${{ secrets[format('{0}_KUBE_CONFIG', needs.resolve-env.outputs.environment_upper)] }}
      GHCR_TOKEN: ${{ secrets.GH_PAT }}
      GH_PAT: ${{ secrets.GH_PAT }}
