[tox]
envlist = lint, typecheck, pylint, security, test, badges
isolated_build = true
skipsdist = false
requires = tox>=4
# Ensure Python 3.12 is always used regardless of system default
min_version = 4.0

[testenv]
basepython = python3.12

# ─────────────────────────────────────────
# LINT — ruff (replaces flake8 + isort + pyupgrade)
# ─────────────────────────────────────────
[testenv:lint]
deps = ruff
commands =
    ruff check .
    ruff format --check .

# ─────────────────────────────────────────
# TYPE CHECK — pyright (strict)
# ─────────────────────────────────────────
[testenv:typecheck]
deps = pyright
commands =
    pyright

# ─────────────────────────────────────────
# PYLINT — deeper static analysis
# Complements ruff — catches logic bugs, complexity, design issues
# ruff = style/format/imports | pylint = logic/design
# ─────────────────────────────────────────
[testenv:pylint]
deps =
    pylint
    pylint-pydantic   ; pydantic model support
commands =
    pylint src --fail-under=8.0

# ─────────────────────────────────────────
# SECURITY — bandit + safety
# bandit: code-level vulns (SQL injection, hardcoded secrets, etc.)
# safety: known CVEs in dependencies
# ─────────────────────────────────────────
[testenv:security]
deps =
    bandit[toml]
    safety
commands =
    bandit -r . -c pyproject.toml
    safety check --full-report

# ─────────────────────────────────────────
# TEST — pytest + coverage gate at 80%
# ─────────────────────────────────────────
[testenv:test]
deps =
    pytest
    pytest-cov
    pytest-asyncio
    httpx              ; FastAPI test client
    respx              ; mock HTTP calls (L2 connector tests)
    freezegun          ; freeze time (TTL, session expiry tests)
    factory-boy        ; test data factories
commands =
    pytest {posargs} \
        --cov=src \
        --cov-report=term-missing \
        --cov-report=xml:coverage.xml \
        --cov-report=html:htmlcov \
        --cov-fail-under=80 \
        -v

[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─────────────────────────────────────────
# COVERAGE CONFIG
# ─────────────────────────────────────────
[coverage:run]
source = src
omit =
    src/migrations/*
    src/**/conftest.py
    src/**/__init__.py

[coverage:report]
fail_under = 80
show_missing = true
skip_covered = false
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:

# ─────────────────────────────────────────
# BADGES — generate coverage badge for README
# Runs after test (needs coverage.xml)
# ─────────────────────────────────────────
[testenv:badges]
deps =
    genbadge[coverage]
    coverage
commands =
    genbadge coverage -i coverage.xml -o badges/coverage.svg
