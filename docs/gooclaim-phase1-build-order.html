<head>
<meta charset="UTF-8">

<title>Gooclaim — Phase 1 Build Order</title>
<style>
  :root {
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-background-primary: #ffffff;
    --color-border-tertiary: rgba(0,0,0,0.12);
    --color-border-secondary: rgba(0,0,0,0.25);
    --font-sans: 'Anthropic Sans', system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary: #e8e6de;
      --color-text-secondary: #9c9a92;
      --color-background-primary: #1c1c1a;
      --color-border-tertiary: rgba(255,255,255,0.1);
      --color-border-secondary: rgba(255,255,255,0.22);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    font-family: var(--font-sans);
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  svg { max-width: 680px; width: 100%; }

  /* Pre-built SVG classes */
  .t  { font-family: var(--font-sans); font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
  .ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
  .th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }
  .arr { fill: none; stroke: var(--color-border-secondary); stroke-width: 1.5; }
  .leader { fill: none; stroke: var(--color-border-secondary); stroke-width: 0.5; stroke-dasharray: 4 3; }

  /* Color ramps */
  .c-teal   { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal   .th, .c-teal   .t  { fill: #085041; }
  .c-teal   .ts { fill: #0F6E56; }
  .c-purple { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th, .c-purple .t  { fill: #26215C; }
  .c-purple .ts { fill: #534AB7; }
  .c-amber  { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber  .th, .c-amber  .t  { fill: #412402; }
  .c-amber  .ts { fill: #854F0B; }
  .c-coral  { fill: #FAECE7; stroke: #993C1D; }
  .c-coral  .th, .c-coral  .t  { fill: #4A1B0C; }
  .c-coral  .ts { fill: #993C1D; }
  .c-gray   { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray   .th, .c-gray   .t  { fill: #2C2C2A; }
  .c-gray   .ts { fill: #5F5E5A; }

  @media (prefers-color-scheme: dark) {
    .c-teal   { fill: #085041; stroke: #5DCAA5; }
    .c-teal   .th, .c-teal   .t  { fill: #9FE1CB; }
    .c-teal   .ts { fill: #5DCAA5; }
    .c-purple { fill: #26215C; stroke: #AFA9EC; }
    .c-purple .th, .c-purple .t  { fill: #CECBF6; }
    .c-purple .ts { fill: #AFA9EC; }
    .c-amber  { fill: #412402; stroke: #EF9F27; }
    .c-amber  .th, .c-amber  .t  { fill: #FAC775; }
    .c-amber  .ts { fill: #EF9F27; }
    .c-coral  { fill: #4A1B0C; stroke: #F0997B; }
    .c-coral  .th, .c-coral  .t  { fill: #F5C4B3; }
    .c-coral  .ts { fill: #F0997B; }
    .c-gray   { fill: #2C2C2A; stroke: #B4B2A9; }
    .c-gray   .th, .c-gray   .t  { fill: #D3D1C7; }
    .c-gray   .ts { fill: #B4B2A9; }
  }

  .node { cursor: pointer; }
  .node:hover rect { opacity: 0.85; }
</style>
</head>
