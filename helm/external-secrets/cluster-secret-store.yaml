# =============================================================================
# ClusterSecretStore — wires ESO to Azure Key Vault `gooclaim-kv-dev`
# =============================================================================
#
# AuthType: WorkloadIdentity — no client secrets, no service principal.
# ESO impersonates the gooclaim-wi-eso-dev UAMI via the federated credential
# bound to the `external-secrets/external-secrets` ServiceAccount.
#
# Apply (tenantId is injected via envsubst at apply time, NOT committed in YAML):
#   export AZURE_TENANT_ID=$(terraform -chdir=terraform/environments/dev output -raw tenant_id)
#   envsubst < gooclaim-infra/helm/external-secrets/cluster-secret-store.yaml | kubectl apply -f -
#
# Verify:
#   kubectl get clustersecretstore gooclaim-azurekv-dev
#   kubectl describe clustersecretstore gooclaim-azurekv-dev | grep -A 5 Status
#   # Expected: Status.Conditions[*].type == Ready, status == True
#
# Per-env: copy this file → cluster-secret-store-nprd.yaml for nprd cluster,
# updating vaultUrl placeholder. Per-env tenantIDs live in .secrets/azure-<env>.md.
# =============================================================================

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gooclaim-azurekv-dev
  labels:
    env: dev
    managed-by: kubectl
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      # Vault URL — DNS-resolvable but explicit name kept in commit for clarity
      vaultUrl: https://gooclaim-kv-dev.vault.azure.net/
      # Tenant ID — required for AAD authority. Injected at apply time via envsubst.
      tenantId: ${AZURE_TENANT_ID}
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets
