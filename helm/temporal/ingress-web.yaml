# =============================================================================
# Temporal Web — public Ingress with Basic Auth + TLS
# =============================================================================
#
# Exposes Temporal Web UI at https://temporal.dev.gooclaim.com behind
# HTTP Basic Auth. Real Let's Encrypt cert auto-issued by cert-manager.
#
# Prerequisites:
#   1. K8s Secret `temporal-basic-auth` in `temporal` namespace with key `auth`
#      containing an htpasswd-formatted entry. Generated locally:
#        htpasswd -nbB admin <password> > /tmp/auth
#        kubectl create secret generic temporal-basic-auth -n temporal --from-file=auth=/tmp/auth
#      Credentials backup lives in AKV as `gooclaim-temporal-web-basic-auth`.
#   2. DNS A record `temporal.dev.gooclaim.com → <LB IP>` (already covered by
#      Cloudflare wildcard `*.dev`)
#
# Apply:
#   kubectl apply -f gooclaim-infra/helm/temporal/ingress-web.yaml
#
# Verify:
#   kubectl get certificate temporal-dev-tls -n temporal      # Ready=True within ~60s
#   curl -I https://temporal.dev.gooclaim.com                 # expect 401 Unauthorized
#   curl -I -u admin:<password> https://temporal.dev.gooclaim.com   # expect 200/302
#
# Security note:
# Basic Auth is sufficient for dev/internal testing. In v1.0+ this should be
# replaced with `gooclaim-auth`-backed reverse proxy with role-based access
# and audit log. Tracked in cluster-bootstrap runbook (Day 6+).
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: temporal-web
  namespace: temporal
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: temporal-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Gooclaim Temporal - admin"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - temporal.dev.gooclaim.com
      secretName: temporal-dev-tls
  rules:
    - host: temporal.dev.gooclaim.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: temporal-web
                port:
                  number: 8080
