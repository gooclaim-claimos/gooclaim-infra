# =============================================================================
# Temporal Postgres credentials — ExternalSecret bridges AKV → K8s Secret
# =============================================================================
#
# Temporal chart expects a Secret with a `password` key. ESO syncs from
# AKV `gooclaim-postgres-admin-password` and creates K8s Secret `temporal-pg`.
#
# Apply BEFORE installing the Temporal Helm chart.
#
# Apply:
#   kubectl create namespace temporal 2>/dev/null || true
#   kubectl apply -f gooclaim-infra/helm/temporal/temporal-pg-secret.yaml
#   kubectl get secret temporal-pg -n temporal  # verify materialized
# =============================================================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: temporal-pg
  namespace: temporal
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gooclaim-azurekv-dev
    kind: ClusterSecretStore
  target:
    name: temporal-pg
    creationPolicy: Owner
  data:
    - secretKey: password   # key name expected by Temporal chart config
      remoteRef:
        key: gooclaim-postgres-admin-password
